rollback_and_review:
  rollback_class: additive_future_work_disposition
  rollback_scope: Before publication revert the atomic TX-39 disposition packet; after publication preserve this decision and supersede it only through a new accountable decision.
  supersession_rule: Any family may resume only through a new accountable scope decision for a named context with its required principals permissions evidence contract and bounded execution transaction.
  review_triggers:
  - a named target system seeks deployment domain acceptance production promotion or operational authority
  - a consequential framework or target change requires broader stakeholder or affected-party legitimacy evidence
  - the bounded non-production migration scope is expanded or reconsidered
  - G-10 reacceptance is separately proposed
