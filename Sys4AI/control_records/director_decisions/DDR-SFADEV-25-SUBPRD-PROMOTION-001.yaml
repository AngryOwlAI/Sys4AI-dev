rejected_routes:
  - route_id: promote_all_modules_to_canonical
    reason: The generated drafts do not yet provide complete canonical replacement text and promotion would duplicate canonical ownership.
  - route_id: promote_selected_modules_without_maintainer_review
    reason: Partial promotion would create asymmetric authority before a source-authority workflow resolves conflict rules.
  - route_id: split_or_merge_modules_in_same_packet
    reason: Splitting or merging would exceed the WS-25 routing decision packet and should be handled by a later bounded AgentJob.
  - route_id: create_final_acceptance_report_now
    reason: WS-26 final acceptance depends on the completed WS-25 routing evidence and must remain a separate continuation packet.
  - route_id: batch_promotion_and_final_acceptance
    reason: The self-hosting boundary and /continue contract allow at most one AgentJob per invocation.
