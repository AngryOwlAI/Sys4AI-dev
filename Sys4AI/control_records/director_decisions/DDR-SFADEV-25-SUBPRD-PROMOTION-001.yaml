    The generated sub-PRDs are useful decomposition views but are not yet complete
    canonical replacements for the Phase 0, Phase 1, or Phase 2 PRDs. Keeping every
    module as a derivative draft gives each module an explicit routing decision
    without creating duplicate canonical requirement ownership.
