- route_id: let_the_runtime_approve_the_evaluation_standard
  reason: SFA-CORE-VALUES-005 prohibits model self-approval of an evaluation standard or acceptance.
- route_id: combine_independent_domain_operational_or_G10_evidence
  reason: Those families require different principals environments methods and grants and remain separately gated.
