rollback_and_review:
  rollback_class: superseding_contract_decision
  before_dependent_implementation: A new accepted Director Decision may revise or reject this disposition; do not mutate this completed record in place.
  after_dependent_implementation: >
    Require impact analysis across templates schemas registries discovery skills
    examples validators host profiles packages and generated derivatives before
    accepting a superseding disposition.
  review_triggers:
    - evidence that existing registries cannot enforce active-version supersession or waiver queries
    - discovery of role authority ambiguity
    - schema or validator behavior that conflates structural and content approval
    - host capability or permission model change
    - proposed restoration of removed execution surfaces
    - material change to G-02 or G-03
  expiry: none; remains controlling until explicitly superseded
