approval_and_promotion_rules:
  allowed_content_states:
    - candidate
    - stakeholder_review
    - approved
    - rejected
    - superseded
  approval_principal: accountable human sponsor or product owner represented by system_director decision evidence
  approval_requirements:
    - approved content uses stable VISION-* or VALUE-* identifiers rather than candidate identifiers
    - approval includes the human principal identity role date and source-backed evidence
    - content approval source authority and structural validation remain independent states
    - silence missing response canonical file location structural validation and model authorship are not consent
  prohibited_approvers:
    - model
    - ai
    - Meta-Agent Runtime acting as sole principal
  promotion_rule: >
    A controlled candidate may become an approved registered source only after
    accountable human approval, complete evidence, stable IDs, current version
    and hash, impact analysis where applicable, and successful validation.
  supersession_rule: >
    Never overwrite an approved artifact in place. Register the new version,
    record active and superseded relationships, retain prior evidence, and
    review affected requirements architecture permissions data threat models
    tests releases operations maintenance improvement and retirement duties.
failure_behavior:
  fail_closed_conditions:
    - missing or unverified approval principal date or evidence
    - approved state paired with candidate identifiers
    - candidate content represented as canonical approval
    - model or runtime-actor self-approval
    - expired waiver used for a new baseline or release
    - stale hash duplicate active version missing supersession link or incomplete impact analysis
    - unknown host capability treated as available
    - missing host permission source or degraded behavior
  required_result: >
    Preserve the artifact as candidate, rejected, superseded, blocked, or
    structurally invalid as appropriate. Never infer approval, permission,
    capability, production readiness, or stakeholder consent.
host_interface_contract_disposition:
  profile_artifact:
    path: Sys4AI/configs/host_profiles/codex_app_reference.toml
    schema_path: Sys4AI/schemas/contracts/host_capability_profile.schema.json
    controlled_profile_path: Sys4AI/docs/codex_host_integration_profile.md
    producer_roles:
      - system_engineer
      - verification_engineer
    consumer_roles:
      - implementation_initialization_agent
      - system_architect
      - requirements_verifier
    schema_owner: verification_engineer
  required_profile_fields:
    - profile_id
    - profile_version
    - host_name
    - host_variant
    - portable_execution_contract_version
    - verified_at
    - verified_by
    - source_evidence
    - environment_scope
    - capability_status
    - permission_source
    - degraded_behavior
    - cancellation_behavior
    - evidence_capture
    - known_limitations
    - review_trigger
  required_interfaces:
    - user interaction
    - workspace filesystem
    - terminal and tests
    - tools connectors and network
    - sub-agents
    - task and thread state
    - memory and retrieval
    - target runtime
  allowed_capability_states:
    - verified_available
    - verified_unavailable
    - permission_dependent
    - environment_dependent
    - unknown
    - deprecated
  permission_precedence: platform and system constraints -> host permissions -> project authorization -> bounded transaction permission envelope -> task objective
  approval_rule: Host claims require observable or official evidence plus safe positive and denial or absence checks; G-07 remains the verification gate.
  failure_rule: Unknown stale denied or unverified capability is unavailable and produces explicit blocked degraded or rerouted state.
validation_obligations:
  TX_07_contract_validation:
    - make validate-artifact-contracts
    - make validate-discovery-template
    - make validate-skills
    - make validate-dev-skills
    - make validate-validation-contract-registry
    - make validate-jsonschema-contracts
    - make validate-registry-graph
    - make validate-requirement-trace
    - make validate-generated-derivatives
  deferred_to_TX_13:
    - focused validate-strategic-intent parser and validator
    - direct CLI and Make targets
    - aggregate make validate integration
    - positive and mandatory negative executable fixtures
    - model self-approval candidate-as-approved waiver-expiry stale-hash supersession and impact-analysis tests
  deferred_to_TX_08_and_TX_13:
    - host capability profile implementation and observable evidence
    - validate-host-capability-profiles
    - permission precedence and degraded-mode tests
  limitation: >
    TX-07 contract validation can prove registered fields schemas headings
    examples and assigned obligations. It cannot prove strategic desirability,
    stakeholder consent, host capability, implementation completeness, or
    runtime safety.
rejected_routes:
  - route_id: approve_templates_without_exact_contracts
    reason: It would leave producer consumer authority schema promotion and failure behavior ambiguous.
  - route_id: create_a_strategic_intent_registry_now
    reason: Existing source relationship artifact discovery and trace registries can represent the required state; a new registry requires evidence of an unenforceable query gap.
  - route_id: treat_structural_validation_as_content_approval
    reason: Structural conformance cannot establish stakeholder consent or strategic legitimacy.
  - route_id: implement_TX_08_inside_TX_07
    reason: Host profile evidence and reviewers differ materially and the transaction backlog keeps these writes separately reviewable.
  - route_id: restore_AgentJob_or_continue_runtime
    reason: G-02 selected harness-neutral execution and any restoration requires a separate explicit decision threat model plan tests and product-owner approval.
