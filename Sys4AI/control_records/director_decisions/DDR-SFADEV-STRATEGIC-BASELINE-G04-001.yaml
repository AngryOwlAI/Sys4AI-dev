selected_route:
  route_id: approve_bounded_artifact_and_interface_contracts
  route_name: accept G-04 with fail-closed strategic and host boundaries
  rationale: >
    The approved contract families assign existing roles, keep source authority
    independent from content approval and structural validation, and define
    explicit failure behavior. They are narrow enough for TX-07 and future
    TX-08 implementation while leaving host capability verification and
    strategic-content approval to G-07 and G-08.
  immediate_effect: >
    G-04 is accepted. TX-07 may create and update only the approved
    strategic-intent templates, metadata schemas, registry contracts,
    noncanonical examples, discovery surfaces, and validation obligations.
    TX-08 becomes dependency-ready but is not executed by this disposition.
