  reason: This would expand the bounded strategic-baseline migration into full-framework implementation without support in the plan definition of done.
- route_id: scoped_plan_text_supersession
  reason: The existing controlled plan supports explicit future-work retention; modifying canonical plan text would add unnecessary baseline risk.
- route_id: bulk_promote_or_close_trace_states
  reason: No implementation verification or coverage evidence supports state promotion.
- route_id: waive_the_410_candidates
  reason: The requirements remain active future work and no waiver was authorized or required.
- route_id: accept_G10_or_promote_to_production
  reason: This packet decides only the 410-candidate interpretation and leaves all later evidence and acceptance gates intact.
