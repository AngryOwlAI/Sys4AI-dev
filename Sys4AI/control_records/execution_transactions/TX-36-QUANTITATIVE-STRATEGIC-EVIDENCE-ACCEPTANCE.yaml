- validator_id: focused_acceptance_semantics
  command_or_method: cd Sys4AI && .venv/bin/python -m unittest tests.test_strategic_metrics tests.test_trace_semantics tests.test_self_hosting_acceptance
  blocking: true
  expected_evidence: Positive acceptance and negative counterfeit pending self-approval inflated and relaxed-threshold probes pass.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass with generated readers current.
- validator_id: frozen_boundaries
  command_or_method: verify TX-23 TX-25 canonical PRDs and requirement trace are unchanged
  blocking: true
  expected_evidence: Frozen hashes and trace pass-planned counts remain unchanged.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
