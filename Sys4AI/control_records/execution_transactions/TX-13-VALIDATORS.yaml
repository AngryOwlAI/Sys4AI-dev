expected_outputs:
- Focused strategic-intent PRD lifecycle-pattern host capability and capability-migration validators.
- Generalized trace enforcement for implementation paths optional profiles program state freshness and generated authority.
- Direct CLI and Make targets integrated into aggregate validation in dependency-safe order.
- Positive and mandatory negative test evidence with the structural limitation notice.
- Registered completion and a TX-14-only handoff.
validators:
- validator_id: focused_tx13_suite
  command_or_method: .venv/bin/python -m unittest tests.test_strategic_intent tests.test_lifecycle_patterns tests.test_prd_semantics tests.test_trace_semantics tests.test_host_profiles tests.test_capability_migration -v
  blocking: true
  expected_evidence: All positive and negative validator fixtures pass.
- validator_id: named_validator_targets
  command_or_method: make validate-strategic-intent validate-prd-semantics validate-host-capability-profiles validate-lifecycle-and-patterns validate-capability-migration validate-requirement-trace
  blocking: true
  expected_evidence: Every required CLI and Make surface passes and reports semantic limitations.
- validator_id: product_unit_suite
  command_or_method: .venv/bin/python -m unittest discover -s tests
  blocking: true
  expected_evidence: All retained and new product tests pass.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass.
- validator_id: trace_preservation
  command_or_method: sha256 requirement_trace_registry.csv and inspect git diff
  blocking: true
  expected_evidence: TX-12 generalized SHA-256 remains b76dd57a8e5be11703213e57661690d7219e3a62eec9971fea633328e9003f97 and the CSV has no diff.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- The trace registry changes or the seven needs_evidence and 200 planned gaps are silently promoted.
- Any mandatory negative fixture fails to reject the invalid condition.
- Program state generated authority or optional-profile semantics cannot fail closed.
- A blocking validator fails after TX-13-scoped repair is exhausted.
- Required work expands into TX-14 Phase 2 authority.
