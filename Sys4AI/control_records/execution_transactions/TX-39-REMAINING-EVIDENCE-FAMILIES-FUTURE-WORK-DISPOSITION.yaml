  expected_evidence: G11-016 TX-39 state and handoff validate while TX-38 remains preserved.
- validator_id: semantic_boundary
  command_or_method: cd Sys4AI && make validate-prd-semantics validate-independent-evaluation
  blocking: true
  expected_evidence: All three dispositions remain future-work classifications and no external production operational stakeholder domain or G-10 claim is introduced.
- validator_id: focused_semantic_tests
  command_or_method: cd Sys4AI && .venv/bin/python -m unittest tests.test_trace_semantics tests.test_self_hosting_acceptance tests.test_independent_evaluation
  blocking: true
  expected_evidence: Future-work-not-waiver and separate G-10 boundaries fail closed.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass with generated readers current.
- validator_id: frozen_boundaries
  command_or_method: verify G11-015 TX-38 G11-014 TX-37 protocol TX-23 TX-25 TX-35 and requirement trace hashes are unchanged
  blocking: true
  expected_evidence: Activated evidence and trace state remain byte-identical.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
