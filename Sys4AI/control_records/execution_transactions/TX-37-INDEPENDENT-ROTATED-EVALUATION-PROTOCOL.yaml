expected_outputs:
- One schema-bound independent evaluation protocol with exact independence confidentiality rotation rubric result and permission requirements.
- A fail-closed validator and positive-negative tests.
- A controlled readiness receipt and handoff that names every external prerequisite and claims no executed result.
validators:
- validator_id: independent_evaluation_protocol_contract
  command_or_method: cd Sys4AI && make validate-independent-evaluation
  blocking: true
  expected_evidence: Protocol validates and reports four blocked external prerequisites with no executed-evidence claim.
- validator_id: independent_evaluation_protocol_tests
  command_or_method: cd Sys4AI && .venv/bin/python -m unittest tests.test_independent_evaluation
  blocking: true
  expected_evidence: Positive readiness and negative self-evaluator confidentiality threshold permission and hash-drift probes pass.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass without frozen baseline changes.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- Any artifact claims an evaluator confidential suite or result exists without external evidence.
- The protocol permits repository storage of confidential holdouts or evaluator identity overlap.
- Any external action data egress permission expansion or adjacent evidence family is required.
- A blocking validator fails after bounded repair.
