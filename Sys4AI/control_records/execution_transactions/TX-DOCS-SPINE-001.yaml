validators:
- validator_id: proposal_integrity
  command_or_method: Verify every SHA256SUMS.json entry against the candidate package bytes.
  blocking: true
  expected_evidence: All eleven listed package files match their declared SHA-256 values.
- validator_id: markdown_source_surface
  command_or_method: cd Sys4AI && make validate-markdown-source-surface
  blocking: true
  expected_evidence: Controlled Markdown sources are registered and generated authority remains bounded.
- validator_id: registry_graph
  command_or_method: cd Sys4AI && make validate-registry-graph
  blocking: true
  expected_evidence: New source and relationship IDs resolve without authority inversion.
- validator_id: generated_readers
  command_or_method: cd Sys4AI && make validate-generated-reader-surface validate-generated-derivatives
  blocking: true
  expected_evidence: Deterministic readers are current and noncanonical.
- validator_id: technical_writing_quality
  command_or_method: Run the active technical-writing-quality-gate warning scan and source-aware review on the six human-facing documents.
  blocking: true
  expected_evidence: Gate result is pass with no unsupported or inflated claim.
- validator_id: product_tests
  command_or_method: cd Sys4AI && .venv/bin/python -m unittest discover -s tests -p test_*.py
  blocking: true
  expected_evidence: The full product unit-test suite passes.
- validator_id: aggregate_validation
  command_or_method: Run make validate from Sys4AI and repository roots.
  blocking: true
  expected_evidence: Product and development-system validation pass.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No patch-integrity error or unrelated change is present.
stop_conditions:
- Any proposal checksum fails.
- A required claim cannot be supported by current controlled sources.
- The documentation requires a Product Requirements Document runtime schema CI package command permission or production change.
- A generated reader would require hand editing.
- A security contact private reporting route supported version or authority would need to be invented.
- A blocking validator fails after the smallest documentation repair.
