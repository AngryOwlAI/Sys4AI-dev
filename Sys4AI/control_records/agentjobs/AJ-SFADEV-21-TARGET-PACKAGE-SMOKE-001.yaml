generated_paths:
  - Sys4AI/examples/target_systems/repo_steward_agent_package/**
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
forbidden_actions:
  - Claim the sample package is production ready.
  - Treat package artifacts as canonical framework requirements.
  - Install runtime dependencies not justified by the Phase 2 PRD.
  - Execute AJ-22 acceptance work in this packet.
expected_outputs:
  - Target package validator module.
  - CLI command for target-package validation.
  - Local sample package under Sys4AI/examples.
  - Unit tests for package validation.
  - Source and derivative registry updates.
  - Completion receipt and handoff recommending AJ-22.
validators:
  - cd Sys4AI && make validate-target-package-smoke
  - cd Sys4AI && .venv/bin/python -m unittest discover -s tests
  - cd Sys4AI && make validate
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-21-TARGET-PACKAGE-SMOKE-001 --json
  - git diff --check
completion_evidence_required:
  - sample package path
  - package validator output
  - unit test output
  - closeout receipt
  - handoff to AJ-22
memory_preflight:
  required: true
  minimum_queries:
    - target package smoke surface
    - package authority boundary
  required_evidence:
    - latest handoff inspection
    - implementation plan inspection
    - target package validator design inspection
authority_boundary:
  may_create_smoke_package: true
  may_create_package_validator: true
  may_claim_production_readiness: false
  may_promote_package_to_canonical_framework_source: false
  may_modify_program_state: true
  may_modify_registries: true
handoff_policy:
  create_handoff_when:
    - target package smoke validator passes
    - packet closes with no active AgentJob
stop_conditions:
  - Package authority cannot be expressed without confusing framework and target-system layers.
  - Smoke package requires production dependencies or external services.
