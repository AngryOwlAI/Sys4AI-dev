  Sys4AI-dev implementation-plan surface, repair the narrow rename-audit
  issue found during validation, and add the missing baseline receipt.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: requirements_verifier
  binding_type: one_job_provisional_role
  authority_scope: WS-00 baseline validation and receipt evidence
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/Sys4AI-dev_all_recommendations_implementation_plan.md
