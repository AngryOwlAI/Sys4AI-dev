  - Sys4AI/registries/requirement_trace_registry.csv
  - Sys4AI/registries/source_registry.csv
  - Sys4AI/registries/control_record_registry.csv
  - Sys4AI/registries/validation_contract_registry.csv
  - Sys4AI/docs/generated/**
  - temp_handoff/handoff-0033.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
forbidden_actions:
  - Create sub-PRDs as canonical without promotion.
  - Supersede canonical Phase 0 Phase 1 or Phase 2 PRDs during strategy work.
  - Delete historical PRDs.
  - Treat generated derivatives as canonical sources.
  - Execute AJ24 sub-PRD draft work in this packet.
expected_outputs:
  - PRD decomposition strategy document.
  - PRD module registry.
  - PRD module registry schema contract.
  - PRD module validator and CLI command.
  - Validator tests.
  - Pending AJ24 sub-PRD draft generation route.
  - Completion receipt and handoff recommending AJ24.
validators:
  - cd Sys4AI && make validate-prd-modules
  - cd Sys4AI && make validate-requirement-trace
  - cd Sys4AI && make validate-registry-graph
  - cd Sys4AI && .venv/bin/python -m unittest discover -s tests
  - cd Sys4AI && make validate CHECK_DIFF_AGENTJOB=AJ-SFADEV-23-PRD-DECOMPOSITION-STRATEGY-001
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-23-PRD-DECOMPOSITION-STRATEGY-001 --json
  - git diff --check
completion_evidence_required:
  - decomposition strategy
  - prd module registry
  - validator output
  - closeout receipt
  - handoff to sub-PRD draft generation
memory_preflight:
  required: true
  minimum_queries:
    - PRD decomposition strategy
    - requirement ownership boundaries
  required_evidence:
    - latest handoff inspection
    - walking skeleton acceptance report inspection
    - canonical PRD inspection
    - requirement trace registry inspection
authority_boundary:
  may_create_prd_decomposition_strategy: true
  may_create_prd_module_registry: true
  may_create_validator: true
  may_create_next_subprd_drafts_agentjob_route: true
  may_create_sub_prd_drafts: false
  may_promote_sub_prds: false
  may_supersede_canonical_prds: false
  may_modify_program_state: true
  may_modify_registries: true
  may_refresh_generated_derivatives: true
handoff_policy:
  create_handoff_when:
    - decomposition strategy exists
    - PRD module registry validates
    - packet closes with no active AgentJob
stop_conditions:
  - Walking skeleton evidence is absent.
  - Requirement ownership cannot be represented without ambiguity.
  - Strategy work requires drafting or promoting sub-PRDs.
  - Any write outside the allowed boundary is required.
