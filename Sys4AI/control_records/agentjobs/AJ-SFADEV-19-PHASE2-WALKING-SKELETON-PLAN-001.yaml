  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - Sys4AI/sys_for_ai/walking_skeleton.py
  - Sys4AI/sys_for_ai/target_package.py
  - Sys4AI/sys_for_ai/trace_flow.py
  - Sys4AI/examples/target_systems/**
forbidden_actions:
  - Implement code during planning.
  - Generate package or export smoke artifacts during planning.
  - Generate tasks without PRD trace.
  - Create tasks too large for one AgentJob.
  - Execute more than one AgentJob in this packet.
  - Treat generated derivatives or memory hits as source authority.
expected_outputs:
  - Director Decision selecting the Phase 2 implementation planning route.
  - Memory preflight receipt with source-first evidence.
  - Controlled Phase 2 walking skeleton implementation plan.
  - Three bounded pending Phase 2 AgentJobs.
  - Source registry and control registry rows for the new artifacts.
  - Requirement trace continuity evidence.
  - Completion receipt, handoff, and temp handoff evidence.
  - Program state returned to complete with no active AgentJob.
validators:
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-19-PHASE2-WALKING-SKELETON-PLAN-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-20-WALKING-SKELETON-FLOW-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-21-TARGET-PACKAGE-SMOKE-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-22-WALKING-SKELETON-DEMO-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-director-decisions control_records/director_decisions
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob-registry registries/agentjob_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-requirement-trace registries/requirement_trace_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-registry-graph registries
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-control-loop
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-19-PHASE2-WALKING-SKELETON-PLAN-001 --json
  - make validate CHECK_DIFF_AGENTJOB=AJ-SFADEV-19-PHASE2-WALKING-SKELETON-PLAN-001
  - git diff --check
completion_evidence_required:
  - director_decision
  - memory_preflight
  - implementation plan path
  - three follow-on AgentJob paths
  - source registry rows
  - requirement trace continuity evidence
  - validation status
  - closeout handoff
memory_preflight:
  required: true
  minimum_queries:
    - Phase 2 walking skeleton implementation plan
    - PRD to AgentJob trace planning
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest handoff inspection
    - WS-19 plan inspection
    - Phase 2 PRD inspection
    - prd-to-implementation-plan skill inspection
authority_boundary:
  may_create_phase2_implementation_plan: true
  may_create_future_pending_agentjobs: true
  may_implement_walking_skeleton_code: false
  may_generate_target_system_package: false
  may_modify_control_closeout_records: true
  may_modify_program_state: true
  may_modify_registries: true
  may_refresh_generated_derivatives: true
  may_promote_generated_derivatives: false
handoff_policy:
  create_handoff_when:
    - Phase 2 implementation plan is produced and validated
    - Future pending AgentJobs are registered
    - Packet closes with no active AgentJob
stop_conditions:
  - Phase 2 PRD is absent or not accepted as controlled source.
  - Requirements cannot be mapped to bounded tasks.
  - Implementation work becomes necessary to complete planning.
  - Package or export smoke artifact creation becomes required.
  - Any write outside the allowed boundary is required.
  - More than one AgentJob would be required.
