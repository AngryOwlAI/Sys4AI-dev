limitations:
- TX-37 creates protocol and readiness evidence; it executes no independent evaluation.
- The repository-visible TX-17 holdouts remain regression evidence and are not confidential external holdouts.
- The protocol cannot establish evaluator independence until a named external evaluator supplies attestations.
- No confidential scenario content or secrets may be committed to this repository.
- No data egress or external execution is authorized by TX-37.
- Passing a later deterministic external run would remain bounded to self-change safety controls and would not prove production, operations, stakeholder, domain, permission, or G-10 claims.
