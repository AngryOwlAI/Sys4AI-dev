name: Cross-version Python

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Sys4AI/requirements.txt
      - name: Install declared dependencies
        run: |
          python -m venv Sys4AI/.venv
          Sys4AI/.venv/bin/python -m pip install --upgrade pip
          Sys4AI/.venv/bin/python -m pip install -r Sys4AI/requirements.txt
      - name: Validate repository
        run: make validate PY=python
